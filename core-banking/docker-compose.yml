services:
  postgres:
    image: postgres:15
    container_name: core_banking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  redis:
    image: redis:7-alpine
    container_name: core_banking_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data

  core-banking:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core_banking_api
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    ports:
      - "${API_PORT}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: "kafka:29092"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"   # local
      - "9093:9093"   # internal controller KRaft
    environment:
      # --- KRaft mode ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller          # node ini sekaligus broker dan controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093   # daftar voter: nodeId@host:controllerPort

      # --- Listeners ---
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Topic defaults ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1       
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3                         # default partisi tiap topic baru

      # --- Performance & log ---
      KAFKA_LOG_RETENTION_HOURS: 168                  # simpan pesan 7 hari
      KAFKA_LOG_SEGMENT_BYTES: 1073741824             # 1 GB per segment
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

      # --- KRaft cluster ID ---
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"           # bisa generate ulang dengan: kafka-storage random-uuid
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s                               # beri waktu KRaft init

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092  # pakai listener INTERNAL
    depends_on:
      kafka:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: core_banking_prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT}:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: core_banking_loki
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.9.0
    container_name: core_banking_tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yaml
    ports:
      - "${TEMPO_PORT}:3200"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: core_banking_grafana
    volumes:
      - ./observability/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  pgdata:
    name: core_banking_pgdata
  redisdata:
    name: core_banking_redisdata
  kafka_data:
    name: kafka_data