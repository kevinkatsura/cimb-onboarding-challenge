version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: core_banking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  core-banking:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core_banking_api
    depends_on:
      - postgres
    ports:
      - "${API_PORT}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: banking
      DB_SSLMODE: disable
    restart: unless-stopped

volumes:
  pgdata:
    name: core_banking_pgdata
