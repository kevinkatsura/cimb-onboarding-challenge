basePath: /
definitions:
  domain.Account:
    properties:
      account_number:
        type: string
      account_type:
        type: string
      available_balance:
        type: integer
      closed_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      customer_id:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      opened_at:
        type: string
      overdraft_limit:
        type: integer
      pending_balance:
        type: integer
      status:
        type: string
      updated_at:
        type: string
    type: object
  dto.CreateAccountRequest:
    properties:
      account_type:
        type: string
      currency:
        type: string
      customer_id:
        type: string
      overdraft_limit:
        type: integer
    type: object
  dto.TransactionHistoryResponse:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      balance_after:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      entry_type:
        type: string
      external_reference:
        type: string
      journal_type:
        type: string
      ledger_entry_id:
        type: string
      reference_id:
        type: string
      status:
        type: string
      transaction_id:
        type: string
      transaction_type:
        type: string
    type: object
  dto.TransferRequest:
    properties:
      amount:
        type: integer
      currency:
        type: string
      from_account:
        type: string
      reference_id:
        type: string
      to_account:
        type: string
    type: object
  dto.TransferResponse:
    properties:
      amount:
        type: integer
      current_balance:
        description: Failure fields
        type: integer
      destination_account:
        type: string
      destination_balance_after:
        type: integer
      message:
        type: string
      source_account:
        type: string
      source_balance_after:
        description: Success fields
        type: integer
      status:
        type: string
      transaction_id:
        type: string
    type: object
  dto.UpdateAccountStatusRequest:
    properties:
      status:
        type: string
    type: object
  response.APIResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta:
        additionalProperties: true
        type: object
      success:
        type: boolean
    type: object
info:
  contact: {}
  description: API documentation for the Core Banking Application.
  title: Core Banking API
  version: "1.0"
paths:
  /accounts:
    get:
      description: Lists all bank accounts under specific cursors and filters.
      parameters:
      - description: Limits response objects
        in: query
        name: limit
        type: integer
      - description: Pagination Base64 Cursor
        in: query
        name: cursor
        type: string
      - description: Filter by Customer ID
        in: query
        name: customer_id
        type: string
      - description: Filter by Status (active, suspended, closed)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domain.Account'
                  type: array
                meta:
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: List Accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Creates a new bank account tied to a customer ID.
      parameters:
      - description: Account Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/domain.Account'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: Create Account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      description: Soft-deletes a bank account if allowed by constraints.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: Delete Account
      tags:
      - accounts
    get:
      description: Fetches a bank account from the system given its UUID.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/domain.Account'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: Get Account by ID
      tags:
      - accounts
    patch:
      consumes:
      - application/json
      description: Manually transitions the active lifecycle state of a bank account.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAccountStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: Update Account Status
      tags:
      - accounts
  /accounts/{id}/transactions:
    get:
      description: Iterates paginated lists isolated for an account.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Limits response objects
        in: query
        name: limit
        type: integer
      - description: Pagination Base64 Cursor
        in: query
        name: cursor
        type: string
      - description: Pagination Direction (next, prev)
        in: query
        name: direction
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.TransactionHistoryResponse'
                  type: array
                meta:
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: List Transactions (By Account)
      tags:
      - transactions
  /transactions:
    get:
      description: Aggregates the global banking journal history explicitly sorted.
      parameters:
      - description: Limits response objects
        in: query
        name: limit
        type: integer
      - description: Pagination Base64 Cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.TransactionHistoryResponse'
                  type: array
                meta:
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: List All Transactions
      tags:
      - transactions
  /v1/transfer:
    post:
      consumes:
      - application/json
      description: Safely processes an inter-account fund transfer linearly.
      parameters:
      - description: Transfer Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.TransferResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: Account Transfer (Optimistic)
      tags:
      - transactions
  /v2/transfer:
    post:
      consumes:
      - application/json
      description: Safely processes a transfer explicitly restricting concurrency
        on the accounts.
      parameters:
      - description: Transfer Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.TransferResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                error:
                  type: string
              type: object
      summary: Account Transfer (Pessimistic Redis Lock)
      tags:
      - transactions
swagger: "2.0"
