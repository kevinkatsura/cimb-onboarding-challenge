basePath: /
definitions:
  account.Account:
    properties:
      account_number:
        type: string
      closed_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      customer_id:
        type: string
      id:
        type: string
      opened_at:
        type: string
      product_code:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  account.CreateAccountRequest:
    properties:
      additionalInfo:
        $ref: '#/definitions/snap.SNAPAdditionalInfo'
      countryCode:
        type: string
      currency:
        type: string
      customerId:
        type: string
      deviceInfo:
        $ref: '#/definitions/account.DeviceInfo'
      email:
        type: string
      lang:
        type: string
      locale:
        type: string
      merchantId:
        type: string
      name:
        type: string
      onboardingPartner:
        type: string
      partnerReferenceNo:
        type: string
      phoneNo:
        type: string
      product_code:
        description: Core banking fields
        type: string
      redirectUrl:
        type: string
      scopes:
        type: string
      seamlessData:
        type: string
      seamlessSign:
        type: string
      state:
        type: string
      subMerchantId:
        type: string
      terminalType:
        type: string
    type: object
  account.DeviceInfo:
    properties:
      manufacturer:
        example: Google
        type: string
      model:
        example: Pixel 7
        type: string
      os:
        example: Android
        type: string
      osVersion:
        example: "13.0"
        type: string
    type: object
  account.ErrorResponse:
    properties:
      responseCode:
        type: string
      responseMessage:
        type: string
    type: object
  account.RegistrationAccountCreationRequest:
    properties:
      additionalInfo:
        $ref: '#/definitions/snap.SNAPAdditionalInfo'
      countryCode:
        example: ID
        type: string
      customerId:
        example: CUST001
        type: string
      deviceInfo:
        $ref: '#/definitions/account.DeviceInfo'
      email:
        example: john.doe@example.com
        type: string
      lang:
        example: id-ID
        type: string
      locale:
        example: JKT
        type: string
      merchantId:
        example: MER001
        type: string
      name:
        example: John Doe
        type: string
      onboardingPartner:
        example: PARTNER01
        type: string
      partnerReferenceNo:
        example: "2020102900000000000001"
        type: string
      phoneNo:
        example: "628123456789"
        type: string
      redirectUrl:
        example: https://partner.com/callback
        type: string
      scopes:
        example: read write
        type: string
      seamlessData:
        example: encrypted_data
        type: string
      seamlessSign:
        example: signature_hash
        type: string
      state:
        example: active
        type: string
      subMerchantId:
        example: SUB001
        type: string
      terminalType:
        example: MOBILE
        type: string
    type: object
  account.ResponseSuccessAccount:
    properties:
      account_number:
        type: string
      id:
        type: string
      product_code:
        type: string
      responseCode:
        type: string
      responseMessage:
        type: string
    type: object
  account.ResponseSuccessAccountList:
    properties:
      data:
        items:
          $ref: '#/definitions/account.Account'
        type: array
      meta:
        additionalProperties: true
        type: object
      responseCode:
        type: string
      responseMessage:
        type: string
    type: object
  account.ResponseSuccessString:
    properties:
      data:
        type: string
      responseCode:
        type: string
      responseMessage:
        type: string
    type: object
  account.UpdateAccountStatusRequest:
    properties:
      status:
        type: string
    type: object
  snap.SNAPAdditionalInfo:
    properties:
      channel:
        type: string
      deviceId:
        type: string
    type: object
  snap.SNAPAmount:
    properties:
      currency:
        type: string
      value:
        description: e.g., "10000.00"
        type: string
    type: object
  transaction.ErrorResponse:
    properties:
      responseCode:
        type: string
      responseMessage:
        type: string
    type: object
  transaction.HistoryDetailData:
    properties:
      additionalInfo:
        $ref: '#/definitions/snap.SNAPAdditionalInfo'
      amount:
        $ref: '#/definitions/snap.SNAPAmount'
      dateTime:
        example: "2019-07-03T12:08:56+07:00"
        type: string
      remark:
        example: Payment to Warung Ikan Bakar
        type: string
      sourceOfFunds:
        items:
          $ref: '#/definitions/transaction.SourceOfFund'
        type: array
      status:
        example: SUCCESS
        type: string
      type:
        example: PAYMENT
        type: string
    type: object
  transaction.IntrabankTransferRequest:
    properties:
      additionalInfo: {}
      amount:
        $ref: '#/definitions/snap.SNAPAmount'
      beneficiaryAccountNo:
        type: string
      customerReference:
        type: string
      feeType:
        type: string
      originatorInfos:
        items:
          $ref: '#/definitions/transaction.OriginatorInfo'
        type: array
      partnerReferenceNo:
        type: string
      remark:
        type: string
      sourceAccountNo:
        type: string
      transactionDate:
        type: string
    type: object
  transaction.IntrabankTransferResponse:
    properties:
      additionalInfo: {}
      amount:
        $ref: '#/definitions/snap.SNAPAmount'
      beneficiaryAccountNo:
        type: string
      beneficiaryBankCode:
        type: string
      customerReference:
        type: string
      originatorInfos:
        items:
          $ref: '#/definitions/transaction.OriginatorInfo'
        type: array
      partnerReferenceNo:
        type: string
      referenceNo:
        type: string
      responseCode:
        type: string
      responseMessage:
        type: string
      sourceAccountNo:
        type: string
      traceNo:
        type: string
      transactionDate:
        type: string
    type: object
  transaction.OriginatorInfo:
    properties:
      originatorBankCode:
        type: string
      originatorCustomerName:
        type: string
      originatorCustomerNo:
        type: string
    type: object
  transaction.ResponseSuccessTransactionList:
    properties:
      data:
        items:
          $ref: '#/definitions/transaction.TransactionHistoryResponse'
        type: array
      meta:
        additionalProperties: true
        type: object
      responseCode:
        type: string
      responseMessage:
        type: string
    type: object
  transaction.SourceOfFund:
    properties:
      amount:
        $ref: '#/definitions/snap.SNAPAmount'
      source:
        example: BALANCE
        type: string
    type: object
  transaction.TransactionHistoryListRequest:
    properties:
      additionalInfo: {}
      cursor:
        example: next_page_token
        type: string
      fromDateTime:
        example: "2019-07-03T12:08:56+07:00"
        type: string
      pageSize:
        example: "10"
        type: string
      partnerReferenceNo:
        example: "2020102900000000000001"
        type: string
      toDateTime:
        example: "2019-07-03T12:08:56+07:00"
        type: string
    type: object
  transaction.TransactionHistoryListResponse:
    properties:
      additionalInfo:
        $ref: '#/definitions/snap.SNAPAdditionalInfo'
      detailData:
        items:
          $ref: '#/definitions/transaction.HistoryDetailData'
        type: array
      partnerReferenceNo:
        example: "2020102900000000000001"
        type: string
      referenceNo:
        example: "2020102977770000000009"
        type: string
      responseCode:
        example: "2001200"
        type: string
      responseMessage:
        example: Request has been processed successfully
        type: string
    type: object
  transaction.TransactionHistoryResponse:
    properties:
      accountId:
        type: string
      accountNumber:
        type: string
      amount:
        type: integer
      balance_after:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      entry_type:
        type: string
      journal_type:
        type: string
      ledger_entry_id:
        type: string
      partnerReferenceNo:
        type: string
      referenceNo:
        type: string
      status:
        type: string
      transaction_id:
        type: string
      transaction_type:
        type: string
      transactionDate:
        type: string
    type: object
  transaction.TransferStatusInquiryRequest:
    properties:
      originalPartnerReferenceNo:
        type: string
      originalReferenceNo:
        type: string
      serviceCode:
        type: string
    type: object
  transaction.TransferStatusInquiryResponse:
    properties:
      amount:
        $ref: '#/definitions/snap.SNAPAmount'
      latestTransactionStatus:
        type: string
      originalPartnerReferenceNo:
        type: string
      originalReferenceNo:
        type: string
      referenceNumber:
        type: string
      responseCode:
        type: string
      responseMessage:
        type: string
      serviceCode:
        type: string
      transactionStatusDesc:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for the Core Banking Application.
  title: Core Banking API
  version: "1.0"
paths:
  /accounts:
    get:
      description: Lists all bank accounts under specific cursors and filters.
      parameters:
      - description: Limits response objects
        in: query
        name: limit
        type: integer
      - description: Pagination Base64 Cursor
        in: query
        name: cursor
        type: string
      - description: Filter by Customer ID
        in: query
        name: customer_id
        type: string
      - description: Filter by Status (active, suspended, closed)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.ResponseSuccessAccountList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/account.ErrorResponse'
      summary: List Accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Creates a new bank account tied to a customer ID.
      parameters:
      - description: Account Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/account.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.ResponseSuccessAccount'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/account.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/account.ErrorResponse'
      summary: Create Account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      description: Soft-deletes a bank account if allowed by constraints.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.ResponseSuccessString'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/account.ErrorResponse'
      summary: Delete Account
      tags:
      - accounts
    get:
      description: Fetches a bank account from the system given its UUID.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.ResponseSuccessAccount'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/account.ErrorResponse'
      summary: Get Account by ID
      tags:
      - accounts
    patch:
      consumes:
      - application/json
      description: Manually transitions the active lifecycle state of a bank account.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/account.UpdateAccountStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.ResponseSuccessString'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/account.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/account.ErrorResponse'
      summary: Update Account Status
      tags:
      - accounts
  /accounts/{id}/transactions:
    get:
      description: Iterates paginated lists isolated for an account.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Limits response objects
        in: query
        name: limit
        type: integer
      - description: Pagination Base64 Cursor
        in: query
        name: cursor
        type: string
      - description: Pagination Direction (next, prev)
        in: query
        name: direction
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transaction.ResponseSuccessTransactionList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
      summary: List Transactions (By Account)
      tags:
      - transactions
  /transactions:
    get:
      description: Aggregates the global banking journal history explicitly sorted.
      parameters:
      - description: Limits response objects
        in: query
        name: limit
        type: integer
      - description: Pagination Base64 Cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transaction.ResponseSuccessTransactionList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
      summary: List All Transactions
      tags:
      - transactions
  /v1.0/registration-account-creation:
    post:
      consumes:
      - application/json
      description: Creates a new customer profile and a default savings account. Service
        Code 06.
      parameters:
      - default: PARTNER001
        description: Partner ID provided by the bank
        in: header
        name: X-PARTNER-ID
        required: true
        type: string
      - default: "2026-04-12T18:00:00Z"
        description: ISO-8601 Timestamp
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - default: valid-signature-for-testing
        description: HMAC-SHA256 Signature
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - default: "1234567890"
        description: Random unique ID representing the request
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - description: Registration Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/account.RegistrationAccountCreationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.ResponseSuccessAccount'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/account.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/account.ErrorResponse'
      summary: Register Account
      tags:
      - accounts
  /v1.0/transaction-history-list:
    post:
      consumes:
      - application/json
      description: Retrieves a paginated list of transaction history based on date
        range and cursor.
      parameters:
      - default: PARTNER001
        description: Partner ID provided by the bank
        in: header
        name: X-PARTNER-ID
        required: true
        type: string
      - default: "2026-04-12T18:00:00Z"
        description: ISO-8601 Timestamp
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - default: valid-signature-for-testing
        description: HMAC-SHA256 Signature
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - default: "1234567890"
        description: Random unique ID representing the request
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - description: History Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transaction.TransactionHistoryListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transaction.TransactionHistoryListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
      summary: Transaction History List (SNAP v1.2)
      tags:
      - transactions
  /v1.0/transfer-intrabank:
    post:
      consumes:
      - application/json
      description: Safely processes an inter-account fund transfer linearly.
      parameters:
      - default: PARTNER001
        description: Partner ID provided by the bank
        in: header
        name: X-PARTNER-ID
        required: true
        type: string
      - default: "2026-04-12T18:00:00Z"
        description: ISO-8601 Timestamp
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - default: valid-signature-for-testing
        description: HMAC-SHA256 Signature
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - default: "1234567890"
        description: Random unique ID representing the request
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - description: Transfer Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transaction.IntrabankTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transaction.IntrabankTransferResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
      summary: Account Transfer (Optimistic)
      tags:
      - transactions
  /v1.0/transfer-intrabank-locked:
    post:
      consumes:
      - application/json
      description: Safely processes a transfer explicitly restricting concurrency
        on the accounts.
      parameters:
      - default: PARTNER001
        description: Partner ID provided by the bank
        in: header
        name: X-PARTNER-ID
        required: true
        type: string
      - default: "2026-04-12T18:00:00Z"
        description: ISO-8601 Timestamp
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - default: valid-signature-for-testing
        description: HMAC-SHA256 Signature
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - default: "1234567890"
        description: Random unique ID representing the request
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - description: Transfer Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transaction.IntrabankTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transaction.IntrabankTransferResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
      summary: Account Transfer (Pessimistic Redis Lock)
      tags:
      - transactions
  /v1.0/transfer/status:
    post:
      consumes:
      - application/json
      description: Fetch transaction status conforming to SNAP BI using Service Code
        36.
      parameters:
      - default: PARTNER001
        description: Partner ID provided by the bank
        in: header
        name: X-PARTNER-ID
        required: true
        type: string
      - default: "2026-04-12T18:00:00Z"
        description: ISO-8601 Timestamp
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - default: valid-signature-for-testing
        description: HMAC-SHA256 Signature
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - default: "1234567890"
        description: Random unique ID representing the request
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - description: Inquiry Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transaction.TransferStatusInquiryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transaction.TransferStatusInquiryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/transaction.ErrorResponse'
      summary: Transfer Status Inquiry
      tags:
      - transactions
swagger: "2.0"
