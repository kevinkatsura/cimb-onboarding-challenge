syntax = "proto3";

package account_information.v1;

option go_package = "proto/account_information/v1;account_informationpb";

service AccountInformationService {
  rpc GetBalance(AccountRequest) returns (GetBalanceResponse);
  rpc GetLastTransactionAsSource(AccountRequest) returns (TransactionResponse);
  rpc GetLastTransactionAsBeneficiary(AccountRequest) returns (TransactionResponse);
  rpc GetAverageAmountLast30Transactions(AccountRequest) returns (AverageAmountResponse);
  rpc GetAccountInfo(AccountRequest) returns (AccountInfoResponse);
}

message AccountRequest {
  string account_number = 1;
}

message GetBalanceResponse {
  string account_number = 1;
  int64 balance = 2;
  string currency = 3;
}

message TransactionResponse {
  string transaction_ref = 1;
  string source_account_number = 2;
  string beneficiary_account_number = 3;
  int64 amount = 4;
  string currency = 5;
  string created_at = 6;
}

message AverageAmountResponse {
  string account_number = 1;
  double average_amount = 2;
  string currency = 3;
}

message AccountInfoResponse {
  string account_number = 1;
  string account_id = 2;
  string customer_id = 3;
  string product_code = 4;
  string currency = 5;
  string status = 6;
  string created_at = 7;
}
