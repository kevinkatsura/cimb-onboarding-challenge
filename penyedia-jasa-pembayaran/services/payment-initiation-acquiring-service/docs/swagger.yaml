basePath: /
definitions:
  internal_transfer.AccountField:
    properties:
      accountNo:
        example: "8001234567890123"
        type: string
    required:
    - accountNo
    type: object
  internal_transfer.AmountField:
    properties:
      currency:
        example: IDR
        type: string
      value:
        example: "150000.00"
        type: string
    required:
    - currency
    - value
    type: object
  internal_transfer.TransferRequest:
    properties:
      additionalInfo: {}
      amount:
        $ref: '#/definitions/internal_transfer.AmountField'
      beneficiaryAccount:
        $ref: '#/definitions/internal_transfer.AccountField'
      feeType:
        enum:
        - OUR
        - BEN
        - SHA
        example: OUR
        type: string
      partnerReferenceNo:
        example: "202311010000000000002"
        type: string
      remark:
        example: Lunch at Warung Ikan Bakar
        type: string
      sourceAccount:
        $ref: '#/definitions/internal_transfer.AccountField'
    required:
    - amount
    - beneficiaryAccount
    - partnerReferenceNo
    - sourceAccount
    type: object
info:
  contact: {}
  description: API for intrabank fund transfers (PJP)
  title: Payment Initiation Acquiring Service API
  version: "1.0"
paths:
  /v1.0/transfer-intrabank:
    post:
      consumes:
      - application/json
      description: Execute an intrabank fund transfer (SNAP Service Code 17)
      parameters:
      - default: "2026-04-15T10:00:00+07:00"
        description: Request timestamp
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - default: PLACEHOLDER
        description: Digital signature
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - default: PJP-001
        description: Partner ID
        in: header
        name: X-PARTNER-ID
        required: true
        type: string
      - default: ext-transfer-001
        description: External ID (idempotency)
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - default: CH001
        description: Channel ID
        in: header
        name: CHANNEL-ID
        required: true
        type: string
      - description: Transfer payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transfer.TransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Intrabank Transfer
      tags:
      - Transfer
swagger: "2.0"
